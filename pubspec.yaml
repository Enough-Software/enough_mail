name: enough_mail_plus
description: "enough_mail fork - IMAP, POP3, SMTP email library with high/low-level APIs and MIME parsing"
version: 2.2.3
repository: https://github.com/nogringo/enough_mail
topics:
  - email
  - imap
  - pop3
  - smtp
  - mime


environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  basic_utils: ^5.8.2
  collection: ^1.19.1
  crypto: ^3.0.6
  # encrypt: ^5.0.3
  encrypter_plus: ^5.1.0
  enough_convert: ^1.6.0
  event_bus: ^2.0.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  pointycastle: ^4.0.0
  synchronized: ^3.4.0
  xml: ">=6.0.0 <7.0.0"

dependency_overrides:
  # http: ^1.4.0 # for dart_code_metrics

dev_dependencies:
  build_runner: ^2.6.0
  # dart_code_metrics: 5.7.6
  dart_code_linter: ^3.0.0
  flutter_lints: ^6.0.0
  json_serializable: ^6.10.0
  lints: ^6.0.0
  test: ^1.26.3
  timezone: ^0.10.1
